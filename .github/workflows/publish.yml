name: publish
on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
    
      dockerfile:
        required: true
        type: string

      context:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate the Compose
        run: docker compose config --quiet

      - name: Build all services
        run: docker compose build

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo-${{ inputs.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-demo-${{ inputs.service }}:sha-${{ github.sha }}